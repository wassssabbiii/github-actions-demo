name: CI Assembly Line

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Run the validation test suite
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Execute Automated Tests
        run: npm test

  # Job 2: Compile the production Docker container
  build-container:
    runs-on: ubuntu-latest
    needs: run-tests # Gatekeeper: Only runs if testing passes successfully!
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Production Image
        run: |
          docker build -t my-app:latest .
          echo "Docker image compiled successfully!"
       # Trigger Render deployment only after tests pass and container compiles successfully
      - name: Trigger Render Deployment
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"   
